<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>React Project</title>
    <style>
        .header-container { display: flex; align-items: center; padding: 50px 10%; justify-content: space-between; }
        .text-section { flex: 1; }
        .image-section { flex: 1; text-align: right; }
        .phone-img { width: 280px; border: 10px solid black; border-radius: 40px; shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .navbar { display: flex; justify-content: space-between; padding: 20px 10%; border-bottom: 1px solid #ddd; background: #fff; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .footer-gradient { background: linear-gradient(to right, #6b21a8, #ec4899); padding: 80px 20px; text-align: center; color: white; }
        .store-badge { height: 45px; margin-right: 10px; }
        body { margin: 0; font-family: sans-serif; }
        a { text-decoration: none; color: #333; font-weight: bold; }
        .btn-blue { background: #002c5c; color: white; padding: 10px 20px; border-radius: 20px; border: none; }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
